name: Build and deploy Astro site to GitHub Pages

on:
  release:
    types: [published]
  # allow manual dispatch for admins/maintenance
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'astro/package-lock.json'

      # Cache Astro build artifacts
      - name: Cache Astro build
        uses: actions/cache@v6
        with:
          path: |
            astro/node_modules
            astro/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('astro/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Install & build (astro)
        working-directory: astro
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Bundle latest APK for WebUSB installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p astro/dist/downloads
          gh release download \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.apk" \
            --dir astro/dist/downloads \
            --clobber
          apk_path="$(find astro/dist/downloads -maxdepth 1 -type f -name "*.apk" | sort | tail -n 1)"
          if [ -z "${apk_path}" ]; then
            echo "No APK release asset found"
            exit 1
          fi
          cp "${apk_path}" astro/dist/downloads/latest.apk

      - name: Upload static build
        uses: actions/upload-pages-artifact@v5
        with:
          path: astro/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
